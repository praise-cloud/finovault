<!-- Bottom Navigation Shell (Auto-suppressed for transactional focus) -->
<!-- However, we'll implement the shared component logic for the requested 'chevron' set if needed on other screens -->
<script>
        // Micro-interaction for OTP movement
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Active State Logic for container focus
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-105');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-105');
            });
        });

        // CTA Click interaction
        const primaryBtn = document.querySelector('button.group');
        primaryBtn.addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                this.innerHTML = 'Verify & Continue';
            }, 2000);
        });
    </script>
